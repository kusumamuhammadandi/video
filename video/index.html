<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Duolingo AI Teacher</title>

    <style>
      body {
        margin: 0;
        background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #111827);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        gap: 20px;
      }

      /* FRAME IPHONE */
      .iphone-frame {
        width: 215px;
        background: black;
        border-radius: 40px;
        padding: 12px;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        border: 4px solid #222;
      }

      video {
        width: 100%;
        border-radius: 30px;
        display: block;
      }

      /* TOMBOL */
      .github-btn {
        padding: 12px 24px;
        background: white;
        color: black;
        text-decoration: none;
        border-radius: 12px;
        font-weight: bold;
        transition: 0.3s;
      }

      .github-btn:hover {
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <!-- FRAME IPHONE -->
    <div class="iphone-frame">
      <video controls autoplay>
        <source src="./duolingo.mp4" type="video/mp4" />
      </video>
    </div>

    <!-- BUTTON GITHUB -->
    <a
      class="github-btn"
      href="https://github.com/kusumamuhammadandi/Duolingo_ai_teacher/tree/main"
      target="_blank"
    >
      View Github
    </a>
  </body>
</html>
